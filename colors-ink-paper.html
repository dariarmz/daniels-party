<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Brand — Logo Marks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; display: grid; grid-template-columns: 200px 1fr; gap: 20px; align-items: center; }
  .panel {
    background: var(--ink-2); border: 1px solid var(--ink-3); border-radius: var(--r-md);
    padding: 24px; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--inner-top-hi);
    aspect-ratio: 1/1;
  }
  .panel.wide { aspect-ratio: auto; height: 100%; }
  .cap {
    position: absolute; top: 8px; left: 12px;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--neon-cyan); text-transform: uppercase;
  }
  .panel { position: relative; }
  img { display: block; max-width: 100%; height: auto; }
</style>
</head>
<body class="tex">
  <div class="panel">
    <span class="cap">// MARK</span>
    <img src="../assets/logo-mark.svg" width="120" height="120" alt="brand mark">
  </div>
  <div class="panel wide">
    <span class="cap">// WORDMARK</span>
    <img src="../assets/logo-wordmark.svg" width="320" height="80" alt="wordmark">
  </div>
</body>
</html>
