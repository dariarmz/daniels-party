<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Brand — Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .group h4 { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--neon-cyan); text-transform: uppercase; margin: 0 0 12px 0; }
  .row { display: flex; gap: 18px; align-items: center; }
  .icon {
    width: 44px; height: 44px;
    border: 1px solid var(--ink-3);
    border-radius: var(--r-md);
    display: grid; place-items: center;
    background: var(--ink-2);
    color: var(--neon-cyan);
  }
  .icon svg { width: 22px; height: 22px; }
  .glyph {
    width: 44px; height: 44px;
    display: grid; place-items: center;
    font-family: var(--font-mono);
    font-size: 22px;
    color: var(--neon-pink);
    text-shadow: var(--glow-sm-pink);
  }
  .note {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--fg3); text-transform: uppercase; margin-left: auto;
  }
</style>
</head>
<body class="tex">
  <div class="group">
    <h4>// LUCIDE · STROKE 1.5</h4>
    <div class="row">
      <!-- map-pin -->
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></div>
      <!-- clock -->
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <!-- calendar -->
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
      <!-- shirt (dress code) -->
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.4 6 16 4l-1 1.5a3 3 0 0 1-6 0L8 4 3.6 6 6 11h2v9h8v-9h2Z"/></svg></div>
      <!-- gift -->
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg></div>
      <!-- zap (party power) -->
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <!-- send -->
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></div>
      <span class="note">via Lucide CDN</span>
    </div>
  </div>
  <div class="group">
    <h4>// ASCII GLYPHS · PART OF TYPE</h4>
    <div class="row">
      <span class="glyph">&gt;</span>
      <span class="glyph">&gt;&gt;</span>
      <span class="glyph">█</span>
      <span class="glyph">▌</span>
      <span class="glyph">▒</span>
      <span class="glyph">◆</span>
      <span class="glyph">●</span>
      <span class="glyph">+</span>
      <span class="glyph">×</span>
      <span class="glyph">//</span>
      <span class="note">no emoji, ever</span>
    </div>
  </div>
</body>
</html>
