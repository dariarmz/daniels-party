<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Spacing — 8px Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; }
  .row { display: flex; align-items: center; gap: 16px; padding: 8px 0; }
  .token { width: 80px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; color: var(--neon-cyan); text-transform: uppercase; }
  .px    { width: 60px; font-family: var(--font-mono); font-size: 11px; color: var(--fg3); text-align: right; }
  .bar   { height: 16px; background: linear-gradient(90deg, var(--neon-pink), var(--neon-acid)); border-radius: 2px; box-shadow: var(--glow-sm-pink); }
</style>
</head>
<body class="tex">
  <div class="row"><span class="token">--s-1</span><span class="px">4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="token">--s-2</span><span class="px">8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="token">--s-3</span><span class="px">12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="token">--s-4</span><span class="px">16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="token">--s-5</span><span class="px">24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="token">--s-6</span><span class="px">32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="token">--s-7</span><span class="px">48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="token">--s-8</span><span class="px">64px</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="token">--s-9</span><span class="px">96px</span><div class="bar" style="width:96px"></div></div>
  <div class="row"><span class="token">--s-10</span><span class="px">128px</span><div class="bar" style="width:128px"></div></div>
</body>
</html>
