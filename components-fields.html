<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Cards — HUD &amp; Ticket</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }

  /* HUD card */
  .hud-card {
    background: var(--ink-2);
    border: 1px solid var(--ink-3);
    border-radius: var(--r-md);
    box-shadow: var(--inner-top-hi);
    padding: 20px;
    position: relative;
  }
  .hud-card .corner { position: absolute; width: 14px; height: 14px; border: 1.5px solid var(--neon-cyan); }
  .hud-card .c-tl { top: 8px; left: 8px;  border-right: none; border-bottom: none; }
  .hud-card .c-tr { top: 8px; right: 8px; border-left: none;  border-bottom: none; }
  .hud-card .c-bl { bottom: 8px; left: 8px;  border-right: none; border-top: none; }
  .hud-card .c-br { bottom: 8px; right: 8px; border-left: none;  border-top: none; }
  .hud-card .cap  { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--neon-cyan); text-transform: uppercase; margin-bottom: 8px; }
  .hud-card .head { font-family: var(--font-display); font-size: 28px; line-height: 1.05; text-transform: uppercase; color: var(--fg1); margin: 0 0 8px 0; letter-spacing: -0.01em; }
  .hud-card .body { font-family: var(--font-body); font-size: 15px; color: var(--fg2); margin: 0; }

  /* Ticket card */
  .ticket {
    background: var(--paper);
    color: var(--ink);
    padding: 20px 22px;
    transform: rotate(-1deg);
    position: relative;
    --notch: 10px;
    -webkit-mask:
      radial-gradient(circle var(--notch) at 0 50%, transparent 98%, #000 100%) 0 0/100% 100%,
      radial-gradient(circle var(--notch) at 100% 50%, transparent 98%, #000 100%) 0 0/100% 100%;
    mask:
      radial-gradient(circle var(--notch) at 0 50%, transparent 98%, #000 100%) 0 0/100% 100%,
      radial-gradient(circle var(--notch) at 100% 50%, transparent 98%, #000 100%) 0 0/100% 100%;
    -webkit-mask-composite: source-in;
            mask-composite: intersect;
    box-shadow: 0 0 64px rgba(255,46,136,0.18);
  }
  .ticket .cap { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--neon-pink); margin-bottom: 6px; }
  .ticket .head { font-family: var(--font-display); font-size: 36px; line-height: 1; text-transform: uppercase; color: var(--ink); margin: 0 0 8px 0; }
  .ticket .body { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--on-paper-2); margin: 0; }
  .ticket hr {
    border: none;
    border-top: 1.5px dashed var(--ink);
    margin: 14px -22px;
    opacity: 0.4;
  }
</style>
</head>
<body class="tex">
  <div class="hud-card">
    <span class="corner c-tl"></span><span class="corner c-tr"></span>
    <span class="corner c-bl"></span><span class="corner c-br"></span>
    <div class="cap">// КООРДИНАТЫ</div>
    <h3 class="head">ZAGA GAME<br>ул. Кирова, 142</h3>
    <p class="body">ТЦ «АЛЫЕ ПАРУСА» · вход с ул. Удмуртской.</p>
  </div>
  <div class="ticket">
    <div class="cap">[ ПРОПУСК.АГЕНТ ]</div>
    <h3 class="head">[ИМЯ УЧАСТНИКА]</h3>
    <p class="body">21.05.26 · 13:00</p>
    <hr>
    <p class="body">ID_[ИМЯ УЧАСТНИКА] // VALID_ONCE</p>
  </div>
</body>
</html>
